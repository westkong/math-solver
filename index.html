<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 수학 해설 생성기</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=JetBrains+Mono:wght@400;600&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
  <script>
    window.MathJax = {
      tex: { inlineMath: [['$','$'],['\\(','\\)']], displayMath: [['$$','$$'],['\\[','\\]']] },
      options: { skipHtmlTags: ['script','noscript','style','textarea','pre'] }
    };
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/3.2.2/es5/tex-chtml.min.js"></script>
  <style>
    :root {
      --bg: #0e0e12;
      --surface: #16161e;
      --surface2: #1e1e2a;
      --border: #2a2a3a;
      --accent: #c8a96e;
      --text: #e8e6e0;
      --text-muted: #7a7890;
      --success: #6ecf8a;
      --error: #ff6b6b;
      --radius: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Noto Sans KR', sans-serif; font-weight: 300;
      min-height: 100vh; display: flex; flex-direction: column;
    }
    body::before {
      content: ''; position: fixed; top: -200px; left: -200px;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(200,169,110,0.06) 0%, transparent 70%);
      pointer-events: none; z-index: 0;
    }
    body::after {
      content: ''; position: fixed; bottom: -200px; right: -200px;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(123,156,255,0.06) 0%, transparent 70%);
      pointer-events: none; z-index: 0;
    }
    header {
      position: relative; z-index: 1;
      padding: 48px 24px 32px; text-align: center;
      border-bottom: 1px solid var(--border);
    }
    .logo-label {
      font-family: 'JetBrains Mono', monospace; font-size: 11px;
      color: var(--accent); letter-spacing: 4px; text-transform: uppercase; margin-bottom: 12px;
    }
    h1 {
      font-family: 'Noto Serif KR', serif;
      font-size: clamp(24px, 4vw, 40px); font-weight: 700;
      letter-spacing: -0.5px; line-height: 1.2;
    }
    h1 span { color: var(--accent); }
    .subtitle { margin-top: 10px; font-size: 14px; color: var(--text-muted); }
    main {
      position: relative; z-index: 1; flex: 1;
      max-width: 780px; width: 100%; margin: 0 auto;
      padding: 40px 24px 80px; display: flex; flex-direction: column; gap: 24px;
    }
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 24px;
    }
    .card-label {
      font-family: 'JetBrains Mono', monospace; font-size: 10px;
      color: var(--text-muted); letter-spacing: 3px;
      text-transform: uppercase; margin-bottom: 12px;
    }
    .api-row { display: flex; gap: 10px; align-items: center; }
    .api-input-wrap { flex: 1; position: relative; }
    input[type="password"], input[type="text"] {
      width: 100%; background: var(--surface2);
      border: 1px solid var(--border); border-radius: 8px;
      padding: 12px 44px 12px 14px; color: var(--text);
      font-family: 'JetBrains Mono', monospace; font-size: 13px;
      outline: none; transition: border-color 0.2s;
    }
    input:focus { border-color: var(--accent); }
    .toggle-btn {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: var(--text-muted);
      cursor: pointer; font-size: 16px; padding: 0; transition: color 0.2s;
    }
    .toggle-btn:hover { color: var(--accent); }
    .api-status {
      font-size: 12px; font-family: 'JetBrains Mono', monospace;
      white-space: nowrap; padding: 10px 14px; border-radius: 8px;
      border: 1px solid var(--border); background: var(--surface2);
      color: var(--text-muted); transition: all 0.3s;
    }
    .api-status.ok { color: var(--success); border-color: var(--success); }
    .api-status.err { color: var(--error); border-color: var(--error); }
    .input-tabs {
      display: flex; border: 1px solid var(--border);
      border-radius: 8px; overflow: hidden; margin-bottom: 16px;
    }
    .input-tab {
      flex: 1; padding: 10px; background: var(--surface2);
      border: none; color: var(--text-muted);
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 13px; cursor: pointer; transition: all 0.2s;
    }
    .input-tab.active { background: var(--accent); color: #1a1508; font-weight: 500; }
    .input-panel { display: none; }
    .input-panel.active { display: block; }
    .subject-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
    .subject-btn {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 20px; padding: 6px 16px; font-size: 12px;
      color: var(--text-muted); cursor: pointer; transition: all 0.2s;
      font-family: 'Noto Sans KR', sans-serif;
    }
    .subject-btn:hover, .subject-btn.active {
      background: var(--accent); border-color: var(--accent);
      color: #1a1508; font-weight: 500;
    }
    textarea {
      width: 100%; background: var(--surface2);
      border: 1px solid var(--border); border-radius: 8px; padding: 16px;
      color: var(--text); font-family: 'Noto Sans KR', sans-serif;
      font-size: 15px; font-weight: 300; line-height: 1.7;
      resize: vertical; min-height: 120px; outline: none; transition: border-color 0.2s;
    }
    textarea:focus { border-color: var(--accent); }
    textarea::placeholder { color: var(--text-muted); }
    .image-upload-area {
      border: 2px dashed var(--border); border-radius: 8px; padding: 40px;
      text-align: center; cursor: pointer; transition: all 0.2s; position: relative;
    }
    .image-upload-area:hover, .image-upload-area.dragover {
      border-color: var(--accent); background: rgba(200,169,110,0.04);
    }
    .image-upload-area input[type="file"] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer;
      width: 100%; height: 100%; padding: 0;
    }
    .upload-icon { font-size: 36px; margin-bottom: 12px; }
    .upload-text { font-size: 14px; color: var(--text-muted); line-height: 1.7; }
    .upload-text span { color: var(--accent); }
    .image-preview { display: none; position: relative; margin-top: 12px; }
    .image-preview img {
      width: 100%; max-height: 320px; object-fit: contain;
      border-radius: 8px; border: 1px solid var(--border);
    }
    .remove-img-btn {
      position: absolute; top: 8px; right: 8px;
      background: rgba(0,0,0,0.7); border: 1px solid var(--border);
      border-radius: 6px; padding: 5px 12px; color: var(--error);
      font-size: 12px; cursor: pointer; transition: all 0.2s;
    }
    .remove-img-btn:hover { background: rgba(255,107,107,0.2); }
    .extra-input { margin-top: 12px; }
    .extra-input textarea { min-height: 72px; font-size: 13px; }
    .generate-btn {
      width: 100%; padding: 16px; background: var(--accent);
      border: none; border-radius: var(--radius); color: #1a1508;
      font-family: 'Noto Serif KR', serif; font-size: 16px; font-weight: 700;
      cursor: pointer; transition: all 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .generate-btn:hover:not(:disabled) {
      background: #d9bb82; transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(200,169,110,0.3);
    }
    .generate-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    .spinner {
      width: 18px; height: 18px; border: 2px solid rgba(0,0,0,0.2);
      border-top-color: #1a1508; border-radius: 50%;
      animation: spin 0.7s linear infinite; display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .result-card {
      display: none; background: var(--surface);
      border: 1px solid var(--border); border-radius: var(--radius);
      overflow: hidden; animation: fadeUp 0.4s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .result-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 24px; background: var(--surface2);
      border-bottom: 1px solid var(--border);
    }
    .result-header-left { display: flex; align-items: center; gap: 10px; }
    .result-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--accent); box-shadow: 0 0 8px var(--accent);
    }
    .result-title {
      font-family: 'JetBrains Mono', monospace; font-size: 11px;
      color: var(--text-muted); letter-spacing: 2px; text-transform: uppercase;
    }
    .copy-btn {
      background: none; border: 1px solid var(--border); border-radius: 6px;
      padding: 6px 12px; color: var(--text-muted); font-size: 12px;
      cursor: pointer; transition: all 0.2s; font-family: 'JetBrains Mono', monospace;
    }
    .copy-btn:hover { border-color: var(--accent); color: var(--accent); }
    .result-body {
      padding: 28px; font-size: 15px; line-height: 2; word-break: keep-all;
    }
    .section-title {
      color: var(--accent); font-weight: 700; font-size: 15px;
      display: block; margin: 16px 0 6px;
    }
    .section-title:first-child { margin-top: 0; }
    .cursor {
      display: inline-block; width: 2px; height: 18px;
      background: var(--accent); margin-left: 2px; vertical-align: middle;
      animation: blink 1s step-end infinite;
    }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    .error-msg {
      display: none; background: rgba(255,107,107,0.08);
      border: 1px solid rgba(255,107,107,0.3); border-radius: var(--radius);
      padding: 16px 20px; color: var(--error); font-size: 14px;
    }
    .hint { font-size: 12px; color: var(--text-muted); margin-top: 8px; line-height: 1.6; }
    footer {
      position: relative; z-index: 1; text-align: center; padding: 20px;
      border-top: 1px solid var(--border); font-size: 12px;
      color: var(--text-muted); font-family: 'JetBrains Mono', monospace;
    }
    footer span { color: var(--accent); }
    @media (max-width: 480px) {
      .api-row { flex-direction: column; }
      .api-status { text-align: center; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo-label">westkong · AI Math Tutor</div>
  <h1>수학 문제 <span>AI 해설</span> 생성기</h1>
  <p class="subtitle">문제를 입력하거나 사진을 찍으면 단계별 풀이를 생성해드려요</p>
</header>

<main>

  <div class="card">
    <div class="card-label">Claude API Key</div>
    <div class="api-row">
      <div class="api-input-wrap">
        <input type="password" id="apiKey" placeholder="sk-ant-api03-..." autocomplete="off" />
        <button class="toggle-btn" onclick="toggleKey()">👁</button>
      </div>
      <div class="api-status" id="apiStatus">미입력</div>
    </div>
    <p class="hint">* API 키는 브라우저 내에서만 사용되며 외부로 전송되지 않아요.</p>
  </div>

  <div class="card">
    <div class="card-label">문제 입력</div>
    <div class="input-tabs">
      <button class="input-tab active" onclick="switchTab('text')">✏️ 텍스트 입력</button>
      <button class="input-tab" onclick="switchTab('image')">📷 사진 업로드</button>
    </div>
    <div class="subject-row" id="subjectRow">
      <button class="subject-btn active" data-subject="수학1">수학Ⅰ</button>
      <button class="subject-btn" data-subject="수학2">수학Ⅱ</button>
      <button class="subject-btn" data-subject="확률과통계">확률과 통계</button>
      <button class="subject-btn" data-subject="미적분">미적분</button>
      <button class="subject-btn" data-subject="대수">대수</button>
      <button class="subject-btn" data-subject="공통수학">공통수학</button>
    </div>
    <div class="input-panel active" id="textPanel">
      <textarea id="problemInput" placeholder="수학 문제를 입력하세요.&#10;&#10;수식 입력 예시:&#10;• 인라인: $\sqrt{x^2+1}=3$&#10;• 블록: $$\int_0^1 x^2\,dx$$&#10;&#10;예) $\log_2 8 + \log_2 4$ 의 값을 구하시오."></textarea>
      <p class="hint">* 수식은 $수식$ (인라인) 또는 $$수식$$ (블록) 형태로 입력하세요.</p>
    </div>
    <div class="input-panel" id="imagePanel">
      <div class="image-upload-area" id="uploadArea">
        <input type="file" id="imageInput" accept="image/*" onchange="handleImageUpload(event)" />
        <div class="upload-icon">📸</div>
        <div class="upload-text">
          사진을 드래그하거나 <span>클릭해서 업로드</span>하세요<br>
          캡처 화면 <strong style="color:var(--accent)">Ctrl+V 붙여넣기</strong>도 가능해요
        </div>
      </div>
      <div class="image-preview" id="imagePreview">
        <img id="previewImg" src="" alt="업로드된 문제 이미지" />
        <button class="remove-img-btn" onclick="removeImage()">✕ 삭제</button>
      </div>
      <div class="extra-input">
        <textarea id="extraInput" placeholder="(선택) 추가 요청사항을 입력하세요.&#10;예) 이 문제 미적분 방법으로 풀어줘 / 3번 문제만 풀어줘"></textarea>
      </div>
    </div>
  </div>

  <button class="generate-btn" id="genBtn" onclick="generate()">
    <div class="spinner" id="spinner"></div>
    <span id="btnText">✦ 해설 생성하기</span>
  </button>

  <div class="error-msg" id="errorMsg"></div>

  <div class="result-card" id="resultCard">
    <div class="result-header">
      <div class="result-header-left">
        <div class="result-dot"></div>
        <div class="result-title">AI 해설 결과</div>
      </div>
      <button class="copy-btn" onclick="copyResult()">복사</button>
    </div>
    <div class="result-body" id="resultBody"></div>
  </div>

</main>

<footer>Built by <span>westkong</span> · Powered by Claude API</footer>

<script>
  let selectedSubject = '수학1';
  let currentTab = 'text';
  let uploadedImageBase64 = null;
  let uploadedImageType = null;

  document.getElementById('subjectRow').addEventListener('click', e => {
    const btn = e.target.closest('.subject-btn');
    if (!btn) return;
    document.querySelectorAll('.subject-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedSubject = btn.dataset.subject;
  });

  function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.input-tab').forEach((b, i) => {
      b.classList.toggle('active', (i === 0 && tab === 'text') || (i === 1 && tab === 'image'));
    });
    document.getElementById('textPanel').classList.toggle('active', tab === 'text');
    document.getElementById('imagePanel').classList.toggle('active', tab === 'image');
  }

  function toggleKey() {
    const input = document.getElementById('apiKey');
    input.type = input.type === 'password' ? 'text' : 'password';
  }

  document.getElementById('apiKey').addEventListener('input', function() {
    const s = document.getElementById('apiStatus');
    if (this.value.startsWith('sk-ant-')) { s.textContent = '✓ 입력됨'; s.className = 'api-status ok'; }
    else if (this.value.length > 0) { s.textContent = '형식 오류'; s.className = 'api-status err'; }
    else { s.textContent = '미입력'; s.className = 'api-status'; }
  });

  function handleImageUpload(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      const result = e.target.result;
      uploadedImageBase64 = result.split(',')[1];
      uploadedImageType = file.type;
      document.getElementById('previewImg').src = result;
      document.getElementById('imagePreview').style.display = 'block';
      document.getElementById('uploadArea').style.display = 'none';
    };
    reader.readAsDataURL(file);
  }

  const uploadArea = document.getElementById('uploadArea');
  uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('dragover'); });
  uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
  uploadArea.addEventListener('drop', e => {
    e.preventDefault(); uploadArea.classList.remove('dragover');
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) handleImageUpload({ target: { files: [file] } });
  });

  function removeImage() {
    uploadedImageBase64 = null; uploadedImageType = null;
    document.getElementById('previewImg').src = '';
    document.getElementById('imagePreview').style.display = 'none';
    document.getElementById('uploadArea').style.display = 'block';
    document.getElementById('imageInput').value = '';
  }

  async function generate() {
    const apiKey = document.getElementById('apiKey').value.trim();
    const btn = document.getElementById('genBtn');
    const spinner = document.getElementById('spinner');
    const btnText = document.getElementById('btnText');
    const resultCard = document.getElementById('resultCard');
    const resultBody = document.getElementById('resultBody');
    const errorMsg = document.getElementById('errorMsg');

    if (!apiKey.startsWith('sk-ant-')) { showError('Claude API 키를 올바르게 입력해주세요. (sk-ant-... 형식)'); return; }

    let messageContent = [];
    const systemPrompt = `당신은 고등학교 ${selectedSubject} 전문 수학 강사입니다. 학생이 스스로 이해하고 풀 수 있도록 친절하고 명확하게 해설해주세요.

반드시 다음 형식으로 답변하세요. 수식은 반드시 LaTeX 형식($...$, $$...$$)으로 작성하세요:

【핵심 개념】
이 문제에서 필요한 개념을 1~2줄로 설명

【단계별 풀이】
STEP 1. ...
STEP 2. ...
(필요한 만큼 단계 추가)

【최종 답】
답: ...

【이것만 기억해요】
이 유형에서 핵심 포인트 1가지`;

    if (currentTab === 'text') {
      const problem = document.getElementById('problemInput').value.trim();
      if (!problem) { showError('수학 문제를 입력해주세요.'); return; }
      messageContent = [{ type: 'text', text: '다음 수학 문제를 풀어주세요:\n\n' + problem }];
    } else {
      if (!uploadedImageBase64) { showError('문제 사진을 업로드해주세요.'); return; }
      const extra = document.getElementById('extraInput').value.trim();
      messageContent = [
        { type: 'image', source: { type: 'base64', media_type: uploadedImageType, data: uploadedImageBase64 } },
        { type: 'text', text: '이미지에 있는 수학 문제를 풀어주세요.' + (extra ? '\n\n추가 요청: ' + extra : '') }
      ];
    }

    btn.disabled = true; spinner.style.display = 'block';
    btnText.textContent = '해설 생성 중...';
    errorMsg.style.display = 'none'; resultCard.style.display = 'none';
    resultBody.innerHTML = '';

    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 2000,
          stream: true,
          system: systemPrompt,
          messages: [{ role: 'user', content: messageContent }]
        })
      });

      if (!response.ok) {
        const err = await response.json();
        throw new Error(err.error?.message || `API 오류 (${response.status})`);
      }

      resultCard.style.display = 'block';
      const cursorEl = document.createElement('span');
      cursorEl.className = 'cursor';
      resultBody.appendChild(cursorEl);

      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let fullText = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        const lines = decoder.decode(value).split('\n');
        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const data = line.slice(6);
          if (data === '[DONE]') continue;
          try {
            const parsed = JSON.parse(data);
            if (parsed.type === 'content_block_delta' && parsed.delta?.text) {
              fullText += parsed.delta.text;
              resultBody.textContent = fullText;
              resultBody.appendChild(cursorEl);
              resultBody.scrollIntoView({ behavior: 'smooth', block: 'end' });
            }
          } catch {}
        }
      }

      cursorEl.remove();
      // HTML 렌더링 + MathJax
      resultBody.innerHTML = formatText(fullText);
      if (window.MathJax) {
        await MathJax.typesetPromise([resultBody]);
      }

    } catch (err) {
      resultCard.style.display = 'none';
      showError('오류가 발생했어요: ' + err.message);
    } finally {
      btn.disabled = false; spinner.style.display = 'none';
      btnText.textContent = '✦ 해설 생성하기';
    }
  }

  function formatText(text) {
    return text
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      // 섹션 헤더 강조
      .replace(/【(.+?)】/g, '<span class="section-title">【$1】</span>')
      // 볼드
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      // 줄바꿈
      .replace(/\n/g, '<br>');
  }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = '⚠ ' + msg; el.style.display = 'block';
  }

  function copyResult() {
    navigator.clipboard.writeText(document.getElementById('resultBody').innerText).then(() => {
      const btn = document.querySelector('.copy-btn');
      btn.textContent = '✓ 복사됨';
      setTimeout(() => btn.textContent = '복사', 2000);
    });
  }

  document.getElementById('problemInput').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); generate(); }
  });

  // 클립보드 이미지 붙여넣기 (Ctrl+V)
  document.addEventListener('paste', e => {
    const items = e.clipboardData?.items;
    if (!items) return;
    for (const item of items) {
      if (item.type.startsWith('image/')) {
        e.preventDefault();
        const file = item.getAsFile();
        if (!file) continue;
        // 이미지 탭으로 자동 전환
        switchTab('image');
        const reader = new FileReader();
        reader.onload = ev => {
          const result = ev.target.result;
          uploadedImageBase64 = result.split(',')[1];
          uploadedImageType = file.type;
          document.getElementById('previewImg').src = result;
          document.getElementById('imagePreview').style.display = 'block';
          document.getElementById('uploadArea').style.display = 'none';
        };
        reader.readAsDataURL(file);
        break;
      }
    }
  });
</script>
</body>
</html>

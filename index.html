<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 수학 해설 생성기</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=JetBrains+Mono:wght@400;600&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0e0e12;
      --surface: #16161e;
      --surface2: #1e1e2a;
      --border: #2a2a3a;
      --accent: #c8a96e;
      --accent2: #7b9cff;
      --text: #e8e6e0;
      --text-muted: #7a7890;
      --success: #6ecf8a;
      --error: #ff6b6b;
      --radius: 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans KR', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* 배경 장식 */
    body::before {
      content: '';
      position: fixed;
      top: -200px; left: -200px;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(200,169,110,0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -200px; right: -200px;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(123,156,255,0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* 헤더 */
    header {
      position: relative;
      z-index: 1;
      padding: 48px 24px 32px;
      text-align: center;
      border-bottom: 1px solid var(--border);
    }

    .logo-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--accent);
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    h1 {
      font-family: 'Noto Serif KR', serif;
      font-size: clamp(24px, 4vw, 40px);
      font-weight: 700;
      letter-spacing: -0.5px;
      line-height: 1.2;
    }

    h1 span {
      color: var(--accent);
    }

    .subtitle {
      margin-top: 10px;
      font-size: 14px;
      color: var(--text-muted);
      font-weight: 300;
    }

    /* 메인 */
    main {
      position: relative;
      z-index: 1;
      flex: 1;
      max-width: 780px;
      width: 100%;
      margin: 0 auto;
      padding: 40px 24px 80px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* 카드 */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
    }

    .card-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    /* API 키 입력 */
    .api-row {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .api-input-wrap {
      flex: 1;
      position: relative;
    }

    input[type="password"], input[type="text"] {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 44px 12px 14px;
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus {
      border-color: var(--accent);
    }

    .toggle-btn {
      position: absolute;
      right: 12px; top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 16px;
      padding: 0;
      transition: color 0.2s;
    }
    .toggle-btn:hover { color: var(--accent); }

    .api-status {
      font-size: 12px;
      font-family: 'JetBrains Mono', monospace;
      white-space: nowrap;
      padding: 10px 14px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text-muted);
      transition: all 0.3s;
    }
    .api-status.ok { color: var(--success); border-color: var(--success); }
    .api-status.err { color: var(--error); border-color: var(--error); }

    /* 문제 입력 */
    .subject-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .subject-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 6px 16px;
      font-size: 12px;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Noto Sans KR', sans-serif;
    }

    .subject-btn:hover,
    .subject-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #1a1508;
      font-weight: 500;
    }

    textarea {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      color: var(--text);
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 15px;
      font-weight: 300;
      line-height: 1.7;
      resize: vertical;
      min-height: 120px;
      outline: none;
      transition: border-color 0.2s;
    }

    textarea:focus { border-color: var(--accent); }
    textarea::placeholder { color: var(--text-muted); }

    /* 생성 버튼 */
    .generate-btn {
      width: 100%;
      padding: 16px;
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      color: #1a1508;
      font-family: 'Noto Serif KR', serif;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      letter-spacing: 0.5px;
    }

    .generate-btn:hover:not(:disabled) {
      background: #d9bb82;
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(200,169,110,0.3);
    }

    .generate-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
    }

    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(0,0,0,0.2);
      border-top-color: #1a1508;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* 결과 */
    .result-card {
      display: none;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      animation: fadeUp 0.4s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .result-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
    }

    .result-header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .result-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
    }

    .result-title {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .copy-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 12px;
      color: var(--text-muted);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'JetBrains Mono', monospace;
    }

    .copy-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .result-body {
      padding: 28px 28px;
      font-size: 15px;
      line-height: 1.9;
      white-space: pre-wrap;
      word-break: keep-all;
    }

    /* 스트리밍 커서 */
    .cursor {
      display: inline-block;
      width: 2px; height: 18px;
      background: var(--accent);
      margin-left: 2px;
      vertical-align: middle;
      animation: blink 1s step-end infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    /* 에러 */
    .error-msg {
      display: none;
      background: rgba(255,107,107,0.08);
      border: 1px solid rgba(255,107,107,0.3);
      border-radius: var(--radius);
      padding: 16px 20px;
      color: var(--error);
      font-size: 14px;
    }

    /* 안내 */
    .hint {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 8px;
      line-height: 1.6;
    }

    /* 푸터 */
    footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 20px;
      border-top: 1px solid var(--border);
      font-size: 12px;
      color: var(--text-muted);
      font-family: 'JetBrains Mono', monospace;
    }

    footer span { color: var(--accent); }

    /* 반응형 */
    @media (max-width: 480px) {
      .api-row { flex-direction: column; }
      .api-status { text-align: center; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo-label">westkong · AI Math Tutor</div>
  <h1>수학 문제 <span>AI 해설</span> 생성기</h1>
  <p class="subtitle">문제를 입력하면 단계별 풀이와 핵심 개념을 설명해드려요</p>
</header>

<main>

  <!-- API 키 입력 -->
  <div class="card">
    <div class="card-label">Claude API Key</div>
    <div class="api-row">
      <div class="api-input-wrap">
        <input type="password" id="apiKey" placeholder="sk-ant-api03-..." autocomplete="off" />
        <button class="toggle-btn" onclick="toggleKey()" title="보기/숨기기">👁</button>
      </div>
      <div class="api-status" id="apiStatus">미입력</div>
    </div>
    <p class="hint">* API 키는 브라우저에만 저장되며 외부로 전송되지 않아요. 새로고침하면 사라져요.</p>
  </div>

  <!-- 문제 입력 -->
  <div class="card">
    <div class="card-label">문제 입력</div>
    <div class="subject-row" id="subjectRow">
      <button class="subject-btn active" data-subject="수학1">수학Ⅰ</button>
      <button class="subject-btn" data-subject="수학2">수학Ⅱ</button>
      <button class="subject-btn" data-subject="확률과통계">확률과 통계</button>
      <button class="subject-btn" data-subject="미적분">미적분</button>
      <button class="subject-btn" data-subject="대수">대수</button>
      <button class="subject-btn" data-subject="공통수학">공통수학</button>
    </div>
    <textarea id="problemInput" placeholder="여기에 수학 문제를 입력하세요.&#10;&#10;예시) 등비수열 {aₙ}에서 a₁=2, 공비 r=3일 때, a₅의 값을 구하시오."></textarea>
  </div>

  <!-- 버튼 -->
  <button class="generate-btn" id="genBtn" onclick="generate()">
    <div class="spinner" id="spinner"></div>
    <span id="btnText">✦ 해설 생성하기</span>
  </button>

  <!-- 에러 -->
  <div class="error-msg" id="errorMsg"></div>

  <!-- 결과 -->
  <div class="result-card" id="resultCard">
    <div class="result-header">
      <div class="result-header-left">
        <div class="result-dot"></div>
        <div class="result-title">AI 해설 결과</div>
      </div>
      <button class="copy-btn" onclick="copyResult()">복사</button>
    </div>
    <div class="result-body" id="resultBody"></div>
  </div>

</main>

<footer>
  Built by <span>westkong</span> · Powered by Claude API
</footer>

<script>
  // 과목 선택
  let selectedSubject = '수학1';
  document.getElementById('subjectRow').addEventListener('click', e => {
    const btn = e.target.closest('.subject-btn');
    if (!btn) return;
    document.querySelectorAll('.subject-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedSubject = btn.dataset.subject;
  });

  // API 키 토글
  function toggleKey() {
    const input = document.getElementById('apiKey');
    input.type = input.type === 'password' ? 'text' : 'password';
  }

  // API 키 상태 표시
  document.getElementById('apiKey').addEventListener('input', function() {
    const status = document.getElementById('apiStatus');
    if (this.value.startsWith('sk-ant-')) {
      status.textContent = '✓ 입력됨';
      status.className = 'api-status ok';
    } else if (this.value.length > 0) {
      status.textContent = '형식 오류';
      status.className = 'api-status err';
    } else {
      status.textContent = '미입력';
      status.className = 'api-status';
    }
  });

  // 해설 생성
  async function generate() {
    const apiKey = document.getElementById('apiKey').value.trim();
    const problem = document.getElementById('problemInput').value.trim();
    const btn = document.getElementById('genBtn');
    const spinner = document.getElementById('spinner');
    const btnText = document.getElementById('btnText');
    const resultCard = document.getElementById('resultCard');
    const resultBody = document.getElementById('resultBody');
    const errorMsg = document.getElementById('errorMsg');

    // 유효성 검사
    if (!apiKey.startsWith('sk-ant-')) {
      showError('Claude API 키를 올바르게 입력해주세요. (sk-ant-... 형식)');
      return;
    }
    if (!problem) {
      showError('수학 문제를 입력해주세요.');
      return;
    }

    // 로딩 시작
    btn.disabled = true;
    spinner.style.display = 'block';
    btnText.textContent = '해설 생성 중...';
    errorMsg.style.display = 'none';
    resultCard.style.display = 'none';
    resultBody.textContent = '';

    const prompt = `당신은 고등학교 ${selectedSubject} 전문 수학 강사입니다.
학생이 문제를 이해하고 스스로 풀 수 있도록 도와주는 방식으로 해설해주세요.

다음 형식으로 답변해주세요:

【핵심 개념】
이 문제에서 필요한 개념을 1~2줄로 설명

【단계별 풀이】
STEP 1. ...
STEP 2. ...
(필요한 만큼 단계 추가)

【최종 답】
답: ...

【이것만 기억해요】
이 유형 문제에서 핵심 포인트 1가지

---
문제: ${problem}`;

    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1500,
          stream: true,
          messages: [{ role: 'user', content: prompt }]
        })
      });

      if (!response.ok) {
        const err = await response.json();
        throw new Error(err.error?.message || `API 오류 (${response.status})`);
      }

      // 스트리밍 처리
      resultCard.style.display = 'block';
      const cursor = document.createElement('span');
      cursor.className = 'cursor';
      resultBody.appendChild(cursor);

      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let fullText = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        const chunk = decoder.decode(value);
        const lines = chunk.split('\n');

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const data = line.slice(6);
          if (data === '[DONE]') continue;

          try {
            const parsed = JSON.parse(data);
            if (parsed.type === 'content_block_delta' && parsed.delta?.text) {
              fullText += parsed.delta.text;
              resultBody.textContent = fullText;
              resultBody.appendChild(cursor);
              resultBody.scrollIntoView({ behavior: 'smooth', block: 'end' });
            }
          } catch {}
        }
      }

      // 커서 제거
      cursor.remove();
      resultBody.textContent = fullText;

    } catch (err) {
      resultCard.style.display = 'none';
      showError('오류가 발생했어요: ' + err.message);
    } finally {
      btn.disabled = false;
      spinner.style.display = 'none';
      btnText.textContent = '✦ 해설 생성하기';
    }
  }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = '⚠ ' + msg;
    el.style.display = 'block';
  }

  function copyResult() {
    const text = document.getElementById('resultBody').textContent;
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.querySelector('.copy-btn');
      btn.textContent = '✓ 복사됨';
      setTimeout(() => btn.textContent = '복사', 2000);
    });
  }

  // 엔터키로 생성 (Shift+Enter는 줄바꿈)
  document.getElementById('problemInput').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey && !e.ctrlKey) {
      e.preventDefault();
      generate();
    }
  });
</script>

</body>
</html>
